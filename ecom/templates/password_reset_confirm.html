{% include "header.html" %}

<div style="height: 50px;"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm" style="margin: 50px 0;">
                <div class="card-body p-5" style="text-align: center;">
                    <h2 class="mb-4">Create New Password</h2>
                    
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    
                    <p class="text-muted mb-4">Enter your new password below.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group mb-3" style="text-align: left;">
                            <label for="password1" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="password1" name="password1" required placeholder="Enter new password">
                        </div>
                        
                        <div class="form-group mb-4" style="text-align: left;">
                            <label for="password2" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="password2" name="password2" required placeholder="Confirm password">
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100">Reset Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% include "footer.html" %}

<style>
    .card {
        border: none;
        border-radius: 12px;
        background: #ffffff;
    }
    
    .form-control {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px 15px;
    }
    
    .form-control:focus {
        border-color: #198754;
        box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
    }
    
    .btn {
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
    }
</style>
