  <style>

/* ===== GREEN NUTRITION THEME ===== */
/* Logo Styling */
.brand-logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 1px;
    color: #ffffff !important;   /* Force white */
    text-decoration: none;
    transition: 0.3s ease;
}

/* Highlight Basket differently */
.brand-logo span {
    color: #d1ffe8;
    font-weight: 600;
}

/* Hover */
.brand-logo:hover {
    color: #ffffff;
}
/* Header background */
#header {
    background: linear-gradient(90deg, #0f5132, #198754, #20c997);
    /* padding: 18px 0; */
    transition: 0.4s ease-in-out;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
}

/* Logo */
.logo h1 a {
    color: #ffffff;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 1px;
    text-decoration: none;
}

.logo h1 a:hover {
    color: #d1ffe8;
}

/* Navbar links */
#navbar ul li a {
    color: #ffffff;
    font-weight: 500;
    margin: 0 12px;
    transition: 0.3s ease;
}

#navbar ul li a:hover {
    color: #d1ffe8;
}

/* Active link */
#navbar ul li .active {
    border-bottom: 2px solid #ffffff;
}

/* Cart icon */
#navbar i {
    color: #ffffff;
    font-size: 20px;
    transition: 0.3s;
}

#navbar i:hover {
    color: #d1ffe8;
    transform: scale(1.1);
}

/* Buttons */
.getstarted {
    background: #ffffff;
    color: #198754 !important;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 600;
    transition: 0.3s;
}

.getstarted:hover {
    background: #d1ffe8;
    color: #0f5132 !important;
}

.mobile-nav-toggle {
    color: #ffffff;
    font-size: 28px;
}
#header.scrolled {
    background: #0f5132;
}

</style>
