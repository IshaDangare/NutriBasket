{% include "header.html" %}

<div style="height: 50px;"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm" style="margin: 50px 0;">
                <div class="card-body p-5" style="text-align: center;">
                    <h2 class="mb-4">Reset Your Password</h2>
                    
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    
                    <p class="text-muted mb-4">Enter your email address and we will send you a link to reset your password.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Send Reset Link</button>
                    </form>
                    
                    <div style="margin-top: 20px;">
                        <p>Remember your password? <a href="{% url 'index' %}">Back to Home</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% include "footer.html" %}

<style>
    .card {
        border: none;
        border-radius: 12px;
        background: #ffffff;
    }
    
    .form-control {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px 15px;
    }
    
    .form-control:focus {
        border-color: #198754;
        box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
    }
    
    .btn {
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
    }
</style>
